[build]
  base = "company-website"
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.11.1"
  NPM_VERSION = "10.2.4"
  NPM_FLAGS = "--legacy-peer-deps"

# Removed legacy redirect from /location to avoid stale 301 caches on mobile

# Cache-control: revalidate HTML quickly; cache static assets long-term
[[headers]]
  for = "/*"
  [headers.values]
    # HTML/doc requests should always revalidate with the CDN/origin
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    # Astro build output (hashed filenames) can be cached aggressively
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
